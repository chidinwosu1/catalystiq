# Render Blueprint for the current Catalyst IQ app.
#
# Creates THREE new resources - a Postgres database, the FastAPI backend, and
# the React static frontend. It does NOT touch any existing service (the old
# Alpaca backend is unaffected; these names are new).
#
# Cookie/CORS note (derived from the auth code, not guessed): the frontend and
# API run on two DIFFERENT onrender.com subdomains. `onrender.com` is on the
# Public Suffix List, so those subdomains are CROSS-SITE, not merely
# cross-origin. A cross-site session cookie is only sent on the frontend's
# API calls when it is SameSite=None + Secure - hence the values below, paired
# with allow_credentials=True and an explicit CORS origin in the app. (Some
# browsers restrict third-party cookies; if login doesn't persist, serve the
# frontend from the backend or use one custom domain for both - see DEPLOY.md.)
#
# A few values depend on the URLs Render assigns at create time, so they are
# `sync: false` and set by you in the dashboard (see DEPLOY.md):
#   - backend  CORS_ALLOW_ORIGINS  -> the frontend URL
#   - frontend VITE_API_BASE_URL   -> the backend URL
#   - backend  APP_PASSWORD        -> your chosen login password (>= 12 chars)

databases:
  - name: catalystiq-db
    databaseName: catalystiq
    user: catalystiq
    plan: free

  # Dedicated tracking store for the OFFLINE ML-validation experiment. Kept
  # SEPARATE from the app database so MLflow's tables can never collide with
  # the app's, and so training never touches production data. Free tier.
  - name: catalystiq-mlflow-db
    databaseName: mlflow
    user: mlflow
    plan: free

services:
  # --- Backend API (FastAPI) ---------------------------------------------
  - type: web
    name: catalystiq-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    # Migrations run on each boot (idempotent); works on the free plan, which
    # has no pre-deploy hook.
    startCommand: alembic upgrade head && uvicorn catalystiq.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ENVIRONMENT
        value: production
      # Your private Catalyst IQ login password. Required in production
      # (>= 12 chars). The app refuses to start without it.
      - key: APP_PASSWORD
        sync: false
      # Signs session cookies only. Render generates a strong random value;
      # it is never shown in the repo and differs from ACTION_API_KEY.
      - key: SESSION_SECRET
        generateValue: true
      # Programmatic bearer token (server-to-server/CI). Auto-generated.
      - key: ACTION_API_KEY
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "true"
      # Cross-site subdomains (see note above) -> None + Secure.
      - key: SESSION_COOKIE_SAMESITE
        value: "none"
      # Set to the exact frontend URL once it exists,
      # e.g. https://catalystiq-web.onrender.com
      - key: CORS_ALLOW_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: catalystiq-db
          property: connectionString
      # Order submission stays DISABLED and Webull READ-ONLY: the enable
      # flags, order-confirmation secret, and broker credentials are
      # intentionally left unset (secure defaults in code).

  # --- Frontend (static site) --------------------------------------------
  - type: web
    name: catalystiq-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Set to the exact backend URL once it exists,
      # e.g. https://catalystiq-api.onrender.com  (then redeploy so it's baked
      # into the build). Leave VITE_ACTION_API_KEY UNSET - auth is the cookie.
      - key: VITE_API_BASE_URL
        sync: false
    # SPA fallback so any path serves the app shell.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # --- MLflow dashboard (offline ML-validation results) ------------------
  # A read-mostly web UI over the dedicated tracking database, so you can
  # compare models/horizons/folds in a browser WITHOUT a terminal. It serves
  # ONLY experiment metrics/params (no secrets, no PII, no app data) and runs
  # no training and no inference.
  #
  # SECURITY: MLflow's UI has no built-in auth, so this service is publicly
  # reachable at its onrender.com URL. The data is non-sensitive experiment
  # metrics, but treat the URL as semi-private and SUSPEND this service when
  # you're not actively viewing results. (To lock it down, run MLflow behind
  # basic auth or a private network - see ML_VALIDATION_MLFLOW.md.)
  #
  # NOTE: with a database-only backend (no attached disk / object store),
  # numeric metrics, params, tags and run structure persist and render here;
  # plot/JSON *artifacts* are not persisted on the free tier (they also print
  # in the training job's run logs). See the docs for adding a disk/S3.
  - type: web
    name: catalystiq-mlflow-ui
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install "mlflow" "psycopg2-binary"
    # Render hands out `postgres://`; MLflow/SQLAlchemy need `postgresql://`.
    startCommand: >-
      export MLFLOW_TRACKING_URI="$(printf '%s' "$MLFLOW_DB_URL" | sed 's#^postgres://#postgresql://#')" &&
      mlflow server --backend-store-uri "$MLFLOW_TRACKING_URI" --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: MLFLOW_DB_URL
        fromDatabase:
          name: catalystiq-mlflow-db
          property: connectionString

  # --- One-time ML-validation training job (manual, offline, fail-closed) -
  # A cron job you TRIGGER MANUALLY ("Trigger Run" in the Render dashboard).
  # The schedule is intentionally rare (once a year) so it effectively never
  # auto-runs; Render bills cron jobs per run, so a suspended/idle job costs
  # nothing. SUSPEND or DELETE it after your run.
  #
  # Safety: training authorization comes ONLY from the `--enable-training`
  # flag on the command (this process only). ENABLE_ML / ENABLE_ML_TRAINING
  # are deliberately NOT set in the environment, so nothing is enabled by
  # config, and no inference, serving, approval, registry promotion or order
  # submission is possible. Silver bars are ingested into an EPHEMERAL SQLite
  # DB (never the production database). Results log to the dedicated MLflow DB.
  #
  # The default universe/date range below is BOUNDED so the run completes on
  # modest compute and within free-provider rate limits. It is a smoke-to-
  # moderate run, NOT genuine validation (survivorship-biased; single provider;
  # limited history). To strengthen it, edit the command to use a larger
  # `--symbols`/`--symbols-file` list and a longer `--start`/`--end`, and use a
  # larger instance - see ML_VALIDATION_MLFLOW.md.
  - type: cron
    name: catalystiq-ml-training
    runtime: python
    plan: starter
    rootDir: .
    schedule: "0 6 1 1 *"
    buildCommand: pip install -r requirements.txt
    startCommand: >-
      export MLFLOW_TRACKING_URI="$(printf '%s' "$MLFLOW_DB_URL" | sed 's#^postgres://#postgresql://#')" &&
      python -m catalystiq.ml.train_cli
      --symbols AAPL,MSFT,NVDA,JPM,BAC,XOM,CVX,UNH,JNJ,PG,KO,HD,CAT,BA,NEE,LIN,SPY,QQQ
      --benchmark SPY --start 2015-01-01 --end 2024-12-31
      --horizons 5,10 --ingest --enable-training
      --database-url sqlite:////tmp/catalystiq_train.db
      --experiment-name catalystiq-ml-validation
      --output-dir /tmp/ml_runner_output
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: MLFLOW_DB_URL
        fromDatabase:
          name: catalystiq-mlflow-db
          property: connectionString
